<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Event Ticket Manager</title>
  <style>
:root {
  --bg: #111418;
  --panel: #1a1f26;
  --panel-2: #20262f;
  --panel-3: #252c36;
  --border: #333c49;
  --border-soft: rgba(255,255,255,.08);
  --text: #f2f4f7;
  --muted: #aeb7c4;
  --muted-2: #7f8a99;
  --accent: #5da9ff;
  --accent-strong: #3187e6;
  --danger: #ff6b6b;
  --danger-strong: #e84f4f;
  --success: #57d68d;
  --shadow: 0 18px 46px rgba(0,0,0,.32);
  --radius-lg: 22px;
  --radius-md: 16px;
  --radius-sm: 12px;
  --focus: 0 0 0 3px rgba(93,169,255,.22);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background: radial-gradient(circle at top left, rgba(93,169,255,.14), transparent 34rem), var(--bg);
}

body {
  min-height: 100%;
  margin: 0;
  color: var(--text);
  background: transparent;
}

button,
input,
select {
  font: inherit;
}

button {
  border: 0;
}

button:focus-visible,
input:focus-visible,
select:focus-visible {
  outline: none;
  box-shadow: var(--focus);
}

svg {
  width: 1.25rem;
  height: 1.25rem;
  display: block;
  fill: currentColor;
}

.app-shell {
  width: min(1480px, calc(100% - 32px));
  margin: 24px auto;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.app-header,
.panel,
.app-footer {
  border: 1px solid var(--border-soft);
  background: linear-gradient(145deg, rgba(31,37,46,.94), rgba(22,26,32,.94));
  box-shadow: var(--shadow);
}

.app-header {
  min-height: 82px;
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 18px;
}

.brand-area {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}

.brand-icon {
  width: 48px;
  height: 48px;
  flex: 0 0 auto;
  display: grid;
  place-items: center;
  border-radius: 16px;
  color: var(--accent);
  background: linear-gradient(145deg, rgba(93,169,255,.18), rgba(255,255,255,.05));
  border: 1px solid rgba(93,169,255,.2);
}

h1,
h2,
p {
  margin: 0;
}

h1 {
  font-size: clamp(1.12rem, 2vw, 1.45rem);
  letter-spacing: -.02em;
}

h2 {
  font-size: 1rem;
  letter-spacing: -.01em;
}

.subline,
.small-muted,
.app-footer {
  color: var(--muted);
}

.subline {
  margin-top: 4px;
  font-size: .92rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.header-actions,
.bulk-actions,
.form-actions,
.dialog-actions,
.inline-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.icon-button {
  width: 42px;
  height: 42px;
  display: grid;
  place-items: center;
  border-radius: 14px;
  color: var(--text);
  background: linear-gradient(145deg, #2b333e, #1c222a);
  border: 1px solid var(--border-soft);
  cursor: pointer;
  transition: transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease, opacity .18s ease;
}

.icon-button:hover:not(:disabled) {
  transform: translateY(-1px);
  border-color: rgba(93,169,255,.38);
  color: var(--accent);
  background: linear-gradient(145deg, #303946, #202833);
}

.icon-button:active:not(:disabled) {
  transform: translateY(0);
}

.icon-button:disabled,
.primary-button:disabled,
.secondary-button:disabled {
  opacity: .45;
  cursor: not-allowed;
  transform: none;
}

.icon-button.danger:hover:not(:disabled) {
  color: var(--danger);
  border-color: rgba(255,107,107,.45);
}

.icon-button.danger-neutral:hover:not(:disabled) {
  color: var(--success);
  border-color: rgba(87,214,141,.38);
}

.content-grid {
  display: grid;
  grid-template-columns: minmax(320px, 410px) minmax(0, 1fr);
  gap: 18px;
  align-items: start;
}

.panel {
  border-radius: var(--radius-lg);
  padding: 18px;
  min-width: 0;
}

.section-heading {
  display: flex;
  justify-content: space-between;
  align-items: start;
  gap: 12px;
  margin-bottom: 16px;
}

.table-heading {
  align-items: center;
}

.small-muted {
  margin-top: 4px;
  font-size: .86rem;
}

.mode-badge {
  display: inline-flex;
  align-items: center;
  height: 28px;
  padding: 0 10px;
  border-radius: 999px;
  font-size: .78rem;
  font-weight: 700;
  color: #d9edff;
  background: rgba(93,169,255,.15);
  border: 1px solid rgba(93,169,255,.25);
  white-space: nowrap;
}

.mode-badge.readonly {
  color: #ffdede;
  background: rgba(255,107,107,.13);
  border-color: rgba(255,107,107,.28);
}

.ticket-form {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.ticket-form label {
  display: grid;
  gap: 7px;
  color: var(--muted);
  font-size: .88rem;
}

.ticket-form label:first-of-type,
.ticket-form label:nth-of-type(4),
.form-actions {
  grid-column: 1 / -1;
}

input,
select {
  width: 100%;
  height: 42px;
  color: var(--text);
  background: #12171d;
  border: 1px solid var(--border);
  border-radius: 13px;
  padding: 0 12px;
  transition: border-color .18s ease, background .18s ease, box-shadow .18s ease;
}

input::placeholder {
  color: #697484;
}

input:disabled,
select:disabled {
  opacity: .55;
  cursor: not-allowed;
  background: #171b21;
}

select {
  appearance: none;
  background-image:
    linear-gradient(45deg, transparent 50%, var(--muted) 50%),
    linear-gradient(135deg, var(--muted) 50%, transparent 50%),
    linear-gradient(to right, rgba(255,255,255,.08), rgba(255,255,255,.08));
  background-position:
    calc(100% - 18px) calc(50% - 3px),
    calc(100% - 13px) calc(50% - 3px),
    calc(100% - 38px) 50%;
  background-size: 5px 5px, 5px 5px, 1px 58%;
  background-repeat: no-repeat;
  padding-right: 48px;
}

.primary-button,
.secondary-button {
  min-height: 42px;
  border-radius: 14px;
  padding: 0 15px;
  font-weight: 700;
  cursor: pointer;
  transition: transform .18s ease, background .18s ease, opacity .18s ease;
}

.primary-button {
  color: #fff;
  background: linear-gradient(145deg, var(--accent), var(--accent-strong));
}

.primary-button:hover:not(:disabled),
.secondary-button:hover:not(:disabled) {
  transform: translateY(-1px);
}

.secondary-button {
  color: var(--text);
  background: linear-gradient(145deg, #2a323d, #202731);
  border: 1px solid var(--border-soft);
}

.table-panel {
  overflow: hidden;
}

.table-shell {
  width: 100%;
  overflow: hidden;
  border-radius: 18px;
  border: 1px solid var(--border-soft);
  background: rgba(12,15,19,.38);
}

.ticket-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  font-size: .9rem;
}

.ticket-table th,
.ticket-table td {
  padding: 12px 10px;
  border-bottom: 1px solid rgba(255,255,255,.07);
  text-align: center;
  vertical-align: middle;
  overflow-wrap: anywhere;
}

.ticket-table th {
  color: #dce5ef;
  font-weight: 800;
  background: rgba(255,255,255,.04);
}

.ticket-table tbody tr {
  transition: background .18s ease;
}

.ticket-table tbody tr:hover {
  background: rgba(93,169,255,.06);
}

.ticket-table tbody tr:last-child td {
  border-bottom: 0;
}

.ticket-table .check-col {
  width: 44px;
}

.ticket-table th:last-child,
.ticket-table td:last-child {
  width: 98px;
}

.ticket-table input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  padding: 0;
}

.row-actions {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.row-actions .icon-button {
  width: 34px;
  height: 34px;
  border-radius: 12px;
}

.row-actions svg {
  width: 1rem;
  height: 1rem;
}

.empty-cell {
  color: var(--muted-2);
  padding: 28px !important;
}

.app-footer {
  border-radius: 18px;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  font-size: .86rem;
}

.link-button {
  padding: 0;
  color: var(--muted);
  background: transparent;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.link-button:hover {
  color: var(--accent);
}

.toast-root {
  position: fixed;
  top: 22px;
  right: 22px;
  z-index: 60;
  display: grid;
  gap: 10px;
  width: min(390px, calc(100vw - 28px));
  pointer-events: none;
}

.toast {
  overflow: hidden;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,.13);
  background: linear-gradient(145deg, rgba(35,42,52,.98), rgba(24,29,36,.98));
  box-shadow: 0 18px 48px rgba(0,0,0,.38);
  padding: 14px 15px;
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: start;
  gap: 12px;
  opacity: 0;
  transform: translateY(-14px) scale(.985);
  animation: toast-in .24s ease forwards;
}

.toast::before {
  content: "";
  width: 9px;
  height: 9px;
  margin-top: 6px;
  border-radius: 999px;
  background: var(--accent);
  box-shadow: 0 0 0 4px rgba(93,169,255,.12);
}

.toast.success::before { background: var(--success); box-shadow: 0 0 0 4px rgba(87,214,141,.12); }
.toast.error::before { background: var(--danger); box-shadow: 0 0 0 4px rgba(255,107,107,.12); }

.toast.hide {
  animation: toast-out .2s ease forwards;
}

.toast strong {
  display: block;
  font-size: .95rem;
  margin-bottom: 2px;
}

.toast span {
  color: var(--muted);
  font-size: .88rem;
}

@keyframes toast-in {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes toast-out {
  to { opacity: 0; transform: translateY(-12px) scale(.985); }
}

.modal-root {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: grid;
  place-items: center;
  padding: 18px;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(6px);
}

.modal-card {
  width: min(520px, 100%);
  border-radius: 24px;
  border: 1px solid var(--border-soft);
  background: linear-gradient(145deg, #222933, #171c23);
  box-shadow: var(--shadow);
  padding: 18px;
}

.modal-card h3 {
  margin: 0 0 8px;
  font-size: 1.08rem;
}

.modal-card p {
  color: var(--muted);
  line-height: 1.5;
  font-size: .92rem;
}

.share-options {
  margin: 16px 0;
  display: grid;
  gap: 10px;
}

.share-option {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 10px;
  align-items: start;
  padding: 12px;
  border-radius: 16px;
  border: 1px solid var(--border-soft);
  background: rgba(255,255,255,.04);
  cursor: pointer;
}

.share-option input {
  width: 18px;
  height: 18px;
  margin-top: 2px;
  accent-color: var(--accent);
}

.share-option strong,
.confirm-check strong {
  display: block;
  margin-bottom: 2px;
}

.share-option span,
.confirm-check span {
  color: var(--muted);
  font-size: .86rem;
  line-height: 1.4;
}

.share-link-box {
  margin-top: 14px;
  display: grid;
  gap: 8px;
}

.share-link-box input {
  font-size: .84rem;
}

.confirm-check {
  margin: 14px 0 4px;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 10px;
  align-items: start;
  color: var(--text);
}

.confirm-check input {
  width: 18px;
  height: 18px;
  margin-top: 2px;
  accent-color: var(--accent);
}

.dialog-actions {
  justify-content: flex-end;
  margin-top: 16px;
}

@media (max-width: 1120px) {
  .content-grid {
    grid-template-columns: 1fr;
  }

  .ticket-table {
    min-width: 0;
    font-size: .84rem;
  }

  .ticket-table th,
  .ticket-table td {
    padding: 10px 7px;
  }
}

@media (max-width: 760px) {
  .app-shell {
    width: min(100% - 18px, 1480px);
    margin: 9px auto;
  }

  .app-header {
    align-items: stretch;
    flex-direction: column;
  }

  .header-actions {
    justify-content: flex-end;
  }

  .ticket-form {
    grid-template-columns: 1fr;
  }

  .ticket-form label,
  .ticket-form label:first-of-type,
  .ticket-form label:nth-of-type(4),
  .form-actions {
    grid-column: 1;
  }

  .ticket-table,
  .ticket-table thead,
  .ticket-table tbody,
  .ticket-table tr,
  .ticket-table th,
  .ticket-table td {
    display: block;
  }

  .ticket-table thead {
    display: none;
  }

  .ticket-table tbody {
    padding: 10px;
    display: grid;
    gap: 10px;
  }

  .ticket-table tbody tr {
    border: 1px solid var(--border-soft);
    border-radius: 18px;
    background: rgba(255,255,255,.035);
    padding: 10px;
  }

  .ticket-table td {
    width: 100% !important;
    border: 0;
    padding: 7px 4px;
    display: grid;
    grid-template-columns: 130px minmax(0, 1fr);
    text-align: left;
    gap: 10px;
  }

  .ticket-table td::before {
    content: attr(data-label);
    color: var(--muted);
    font-weight: 700;
  }

  .ticket-table td.check-col {
    grid-template-columns: auto 1fr;
  }

  .ticket-table td.check-col::before {
    content: "Auswahl";
  }

  .row-actions {
    justify-content: flex-start;
  }

  .empty-cell {
    display: block !important;
    text-align: center !important;
  }

  .empty-cell::before {
    content: "" !important;
  }

  .toast-root {
    top: 12px;
    right: 14px;
  }
}


.share-option.is-disabled {
  opacity: 0.55;
  cursor: not-allowed;
}

.share-option.is-disabled * {
  cursor: not-allowed;
}

  </style>
</head>
<body>
  <div id="app" class="app-shell">
    <header class="app-header">
      <div class="brand-area">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M5 4.75A2.75 2.75 0 0 1 7.75 2h8.5A2.75 2.75 0 0 1 19 4.75v14.5A2.75 2.75 0 0 1 16.25 22h-8.5A2.75 2.75 0 0 1 5 19.25V4.75Zm2.75-1.1c-.6 0-1.1.5-1.1 1.1v14.5c0 .6.5 1.1 1.1 1.1h8.5c.6 0 1.1-.5 1.1-1.1V4.75c0-.6-.5-1.1-1.1-1.1h-8.5ZM8.7 7.5c0-.46.37-.82.82-.82h4.96a.82.82 0 1 1 0 1.64H9.52a.82.82 0 0 1-.82-.82Zm0 4.5c0-.46.37-.82.82-.82h4.96a.82.82 0 1 1 0 1.64H9.52A.82.82 0 0 1 8.7 12Zm0 4.5c0-.46.37-.82.82-.82h2.66a.82.82 0 1 1 0 1.64H9.52a.82.82 0 0 1-.82-.82Z"/></svg>
        </div>
        <div>
          <h1>Event Ticket Manager</h1>
          <p id="connectionStatus" class="subline">Lokale Ticketliste</p>
        </div>
      </div>

      <div class="header-actions" aria-label="Header-Aktionen">
        <button id="shareButton" class="icon-button" type="button" title="Ticketliste teilen" aria-label="Ticketliste teilen">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11A2.99 2.99 0 1 0 15 5c0 .24.04.47.09.7L8.04 9.81A3 3 0 1 0 8.04 14.2l7.12 4.18c-.05.2-.08.41-.08.63a2.92 2.92 0 1 0 2.92-2.92Z"/></svg>
        </button>
        <button id="exportAllButton" class="icon-button" type="button" title="Alle Tickets als CSV exportieren" aria-label="Alle Tickets als CSV exportieren">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a1 1 0 0 1 1 1v8.59l2.3-2.3a1 1 0 1 1 1.4 1.42l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 1 1 1.4-1.42l2.3 2.3V4a1 1 0 0 1 1-1ZM5 17a1 1 0 0 1 1 1v1h12v-1a1 1 0 1 1 2 0v1.25A1.75 1.75 0 0 1 18.25 21H5.75A1.75 1.75 0 0 1 4 19.25V18a1 1 0 0 1 1-1Z"/></svg>
        </button>
      </div>
    </header>

    <main class="content-grid">
      <section class="panel form-panel" aria-labelledby="formTitle">
        <div class="section-heading">
          <h2 id="formTitle">Ticket erfassen</h2>
          <span id="modeBadge" class="mode-badge">Bearbeitbar</span>
        </div>

        <form id="ticketForm" class="ticket-form" autocomplete="off">
          <input id="editingId" type="hidden">

          <label>
            <span>Ticketnummer</span>
            <input id="ticketNumber" name="ticketNumber" type="text" required placeholder="z. B. A-001">
          </label>

          <label>
            <span>Vorname</span>
            <input id="firstName" name="firstName" type="text" required placeholder="Vorname">
          </label>

          <label>
            <span>Nachname</span>
            <input id="lastName" name="lastName" type="text" required placeholder="Nachname">
          </label>

          <label>
            <span>Telefonnummer</span>
            <input id="phone" name="phone" type="tel" placeholder="Optional">
          </label>

          <label>
            <span>Tickettyp</span>
            <select id="ticketType" name="ticketType">
              <option value="Standard">Standard</option>
              <option value="VIP">VIP</option>
              <option value="Supporter">Supporter</option>
              <option value="Gast">Gast</option>
            </select>
          </label>

          <label>
            <span>Preis</span>
            <input id="price" name="price" type="number" min="0" step="0.01" placeholder="0,00">
          </label>

          <label>
            <span>Menü</span>
            <select id="menu" name="menu">
              <option value="">Kein Menü</option>
              <option value="Menü 1">Menü 1</option>
              <option value="Menü 2 (Veggie)">Menü 2 (Veggie)</option>
            </select>
          </label>

          <div class="form-actions">
            <button id="submitButton" class="primary-button" type="submit">Ticket speichern</button>
            <button id="cancelEditButton" class="secondary-button" type="button" hidden>Bearbeitung abbrechen</button>
          </div>
        </form>
      </section>

      <section class="panel table-panel" aria-labelledby="tableTitle">
        <div class="section-heading table-heading">
          <div>
            <h2 id="tableTitle">Ticketliste</h2>
            <p id="tableInfo" class="small-muted">0 Tickets</p>
          </div>

          <div id="bulkActions" class="bulk-actions" hidden>
            <span id="selectedCount" class="small-muted">0 ausgewählt</span>
            <button id="exportSelectedButton" class="icon-button danger-neutral" type="button" title="Ausgewählte Tickets als CSV-Datei exportieren" aria-label="Ausgewählte Tickets als CSV-Datei exportieren">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a1 1 0 0 1 1 1v8.59l2.3-2.3a1 1 0 1 1 1.4 1.42l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 1 1 1.4-1.42l2.3 2.3V4a1 1 0 0 1 1-1ZM5 17a1 1 0 0 1 1 1v1h12v-1a1 1 0 1 1 2 0v1.25A1.75 1.75 0 0 1 18.25 21H5.75A1.75 1.75 0 0 1 4 19.25V18a1 1 0 0 1 1-1Z"/></svg>
            </button>
            <button id="deleteSelectedButton" class="icon-button danger" type="button" title="Ausgewählte Tickets löschen" aria-label="Ausgewählte Tickets löschen">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 3.5A1.5 1.5 0 0 1 10.5 2h3A1.5 1.5 0 0 1 15 3.5V4h4a1 1 0 1 1 0 2h-.62l-.83 13.1A3.1 3.1 0 0 1 14.46 22H9.54a3.1 3.1 0 0 1-3.09-2.9L5.62 6H5a1 1 0 0 1 0-2h4v-.5ZM10.5 4h3v-.5h-3V4ZM7.63 6l.82 12.98c.04.57.51 1.02 1.09 1.02h4.92c.58 0 1.05-.45 1.09-1.02L16.37 6H7.63ZM10 9a1 1 0 0 1 1 1v6a1 1 0 1 1-2 0v-6a1 1 0 0 1 1-1Zm4 0a1 1 0 0 1 1 1v6a1 1 0 1 1-2 0v-6a1 1 0 0 1 1-1Z"/></svg>
            </button>
          </div>
        </div>

        <div class="table-shell">
          <table class="ticket-table">
            <thead>
              <tr>
                <th class="check-col"><input id="selectAll" type="checkbox" aria-label="Alle Tickets auswählen"></th>

  function loadSocketClient() {

  async function onSubmitTicket(event) {
